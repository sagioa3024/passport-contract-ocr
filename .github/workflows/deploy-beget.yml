name: Deploy to Beget

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      server_dir:
        description: FTP directory on Beget
        required: true
        default: /public_html/contract/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public_html to Beget
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: osagitop.beget.tech
          username: osagitop_1
          password: ${{ secrets.BEGET_FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ${{ github.event.inputs.server_dir || '/public_html/contract/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/config.php
            **/uploads/**
            **/generated/**
