name: Deploy to Beget

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public_html to Beget
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BEGET_FTP_SERVER }}
          username: ${{ secrets.BEGET_FTP_USERNAME }}
          password: ${{ secrets.BEGET_FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ${{ secrets.BEGET_FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/config.php
            **/uploads/**
            **/generated/**
